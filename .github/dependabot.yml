version: 2
updates:
  # npm依存パッケージの更新（週1回、まとめてPR）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actionsの更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

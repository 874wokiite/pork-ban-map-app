version: 2
updates:
  # npm依存パッケージの更新（週1回、まとめてPR）
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # メジャーアップデート（next 16等）は破壊的変更を含むため手動で対応する
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actionsの更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
